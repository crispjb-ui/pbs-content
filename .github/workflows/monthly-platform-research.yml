name: Monthly Platform Best-Practices Research

# Runs /platform-research: researches CURRENT best practices for 10 platforms (LinkedIn, Substack, X,
# YouTube Shorts, TikTok, Instagram, Facebook, Threads, YouTube long-form, Reddit/Quora) with adversarial verification, vets
# each tactic for ToS risk + B2B brand-fit, auto-applies safe format/spec/tactic
# updates to platform_playbooks.md, and proposes rule-level changes to OPEN_ITEMS.
# Drafting/research only; never auto-publishes. Offset to the 15th so it doesn't
# collide with the 1st/8th/22nd monthly jobs. Uses the same ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: '0 13 15 * *'   # 15th of each month, ~9-10 AM ET
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  issues: write

jobs:
  platform-research:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: vars
        run: echo "date_iso=$(date -u +%F)" >> "$GITHUB_OUTPUT"
      - name: Run /platform-research
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash,WebSearch,WebFetch"
          prompt: |
            Read CLAUDE.md first. Then run the /platform-research slash command
            (.claude/commands/platform-research.md) in full. Do not commit; the
            next step commits.
      - name: Commit playbook updates + proposals
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add platform_playbooks.md OPEN_ITEMS.md
          if git diff --staged --quiet; then echo "No platform-research changes."; exit 0; fi
          git commit -m "Monthly platform best-practices research: ${{ steps.vars.outputs.date_iso }}"
          git push origin HEAD:main
      - name: Notify rolling issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/notify_issue.sh "$(cat /tmp/notify_body.md 2>/dev/null || echo 'Platform research ran; see latest commit.')"
