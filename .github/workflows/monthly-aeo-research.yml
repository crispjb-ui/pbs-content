name: Monthly AEO/SEO Research

# Researches how answer engines (ChatGPT, Perplexity, Google AI Overviews,
# Gemini, Claude) and Google search are CURRENTLY evolving for citation/ranking,
# verifies adversarially, vets for B2B brand-fit, auto-applies safe technique
# updates to aeo_seo_playbook.md, and proposes rule-level changes to OPEN_ITEMS.
# Research/drafting only; never publishes. The SEARCH counterpart to
# monthly-platform-research. Uses the same ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: '0 13 18 * *'   # 18th of each month, ~9-10 AM ET (spaced from the 8th/15th/22nd jobs)
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  issues: write

jobs:
  aeo-research:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "date_iso=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - name: Run /aeo-research
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash,WebSearch,WebFetch"
          prompt: |
            Read CLAUDE.md first. Then run the /aeo-research slash command
            (.claude/commands/aeo-research.md). Research current answer-engine +
            Google search technique, adversarially verify (CONFIRMED/DIRECTIONAL
            + source + date), vet for B2B brand-fit and penalty risk, AUTO-APPLY
            the safe technique refreshes to aeo_seo_playbook.md (add a dated
            changelog entry), and PROPOSE any rule-level change to OPEN_ITEMS.md
            (do not edit CLAUDE.md). Never fabricate engine behavior or figures;
            never publish. Write the two-section notify body to /tmp/notify_body.md.
            Do not commit; the next step commits.
      - name: Commit research updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          if git diff --staged --quiet; then echo "No research updates produced."; exit 0; fi
          git commit -m "Monthly AEO/SEO research: ${{ steps.vars.outputs.date_iso }}"
          git push origin HEAD:main
      - name: Notify rolling issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.NOTIFY_PAT || secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/notify_issue.sh "$(cat /tmp/notify_body.md 2>/dev/null || echo '**Monthly AEO/SEO Research** ran; see the latest commit to aeo_seo_playbook.md.')"
