name: Quarterly Landscape Research

# Deep PBM/pharmacy-benefits landscape research each quarter, then feed it back
# into the content system: auto-apply safe sourced updates (shocking-fact bank,
# X recipe bank) and propose strategy-level changes (new topics, Potter pieces)
# to OPEN_ITEMS for review. The expansion counterpart to the monthly system audit.
# Mirrors the roundup workflow; uses the existing ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: '0 14 1 1,4,7,10 *'   # 1st of Jan/Apr/Jul/Oct, ~9-10 AM ET
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  quarterly-research:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: vars
        run: echo "date_iso=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - name: Run /quarterly-research
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash,WebSearch,WebFetch"
          prompt: |
            Read CLAUDE.md first. Then run the /quarterly-research slash command
            (.claude/commands/quarterly-research.md) in full.

            Auto-apply ONLY the safe, sourced, additive updates (shocking-fact bank
            and X recipe bank entries, with citations; retire common-knowledge facts).
            Write strategy-level proposals (new week topics, Potter pieces, shape
            shifts) to OPEN_ITEMS.md for Ginny — do not auto-build them. No fabricated
            figures; cite every number. Write the cited report under research/.
            Do not commit; the next step commits everything.
      - name: Commit research + safe updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          if git diff --staged --quiet; then echo "No quarterly research output."; exit 0; fi
          git commit -m "Quarterly landscape research + safe content updates: ${{ steps.vars.outputs.date_iso }}"
          git push origin HEAD:main
