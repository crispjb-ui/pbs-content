name: Monthly System Audit

# Runs /system-audit: scans rules/skills for drift/conflict, refreshes the
# shocking-fact bank (retire stale, web-verify, promote pipeline candidates),
# checks banks/cadence/learning-loop. Applies safe obvious fixes, commits a
# dated report. Mirrors the roundup workflow; uses the same ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: '0 14 1 * *'   # 1st of each month, ~9-10 AM ET
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  issues: write

jobs:
  system-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: vars
        run: echo "date_iso=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - name: Run /system-audit
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash,WebSearch,WebFetch"
          prompt: |
            Read CLAUDE.md first. Then run the /system-audit slash command
            (.claude/commands/system-audit.md) in full.

            Apply only the safe, obvious fixes (retire a clearly common-knowledge
            shocking fact, fix a clearly contradictory/stale rule line, correct an
            out-of-date figure you verified via WebSearch). Leave judgment calls for
            Ginny and add them to OPEN_ITEMS.md.

            Write the full audit report to
            audit_reports/audit_${{ steps.vars.outputs.date_iso }}.md (create the
            folder if needed). Do not commit; the next step commits everything.
      - name: Commit audit fixes + report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          if git diff --staged --quiet; then echo "No audit changes."; exit 0; fi
          git commit -m "Monthly system audit + safe fixes: ${{ steps.vars.outputs.date_iso }}"
          # Rebase onto the latest main and retry so a concurrent automation push
          # (e.g. monthly + quarterly both fire on the 1st) cannot reject and lose this run.
          push_ok=0
          for attempt in 1 2 3 4 5; do
            git fetch origin main || true
            if git rebase origin/main; then
              if git push origin HEAD:main; then push_ok=1; break; fi
            else
              git rebase --abort || true
            fi
            echo "push attempt $attempt failed (likely a concurrent push); retrying in 5s..."
            sleep 5
          done
          [ "$push_ok" = "1" ] || { echo "ERROR: could not push to main after retries"; exit 1; }
      - name: Notify rolling issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.NOTIFY_PAT || secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/notify_issue.sh "$(cat <<'EOF'
          **Monthly System Audit** · ${{ steps.vars.outputs.date_iso }}
          Monthly system audit committed (dated report + safe fixes). Review proposed changes.
          EOF
          )"
