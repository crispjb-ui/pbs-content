name: Monthly PBS Briefing Draft

# 25th of each month ~9:30 AM Eastern: draft next month's "PBS Briefing"
# nurture email (Email 06, first-Tuesday send) via /draft-monthly-briefing,
# commit for review, and remind Ginny to schedule it in Wix. Nothing sends
# automatically. (Added Jul 3, 2026, Tier 1 automation from the strategy audit.)

on:
  schedule:
    - cron: '30 13 25 * *'  # 9:30 AM EDT / 8:30 AM EST — hour drift is fine for a drafting job
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  issues: write

jobs:
  draft-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Draft the briefing with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash"
          prompt: |
            Run the /draft-monthly-briefing slash command. The command
            definition lives at .claude/commands/draft-monthly-briefing.md.
            Follow every step in that file, including the Step 0 skip rule.
            Do not commit; the next workflow step handles it.

      - name: Verify a briefing (or skip note) was written
        run: |
          if ! ls email_gated_toolkit/briefings/briefing_*.md >/dev/null 2>&1; then
            echo "::error::No briefing file found; Claude did not save a draft or skip note."
            exit 1
          fi
          ls -la email_gated_toolkit/briefings/

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add email_gated_toolkit/briefings/
          if git diff --staged --quiet; then
            echo "No changes"; exit 0
          fi
          git commit -m "Monthly PBS Briefing draft: $(TZ=America/New_York date +%Y-%m) (review pending)"
          push_ok=0
          for attempt in 1 2 3 4 5; do
            git fetch origin main || true
            if git rebase origin/main; then
              if git push origin HEAD:main; then push_ok=1; break; fi
            else
              git rebase --abort || true
            fi
            sleep 5
          done
          [ "$push_ok" = "1" ] || { echo "ERROR: could not push"; exit 1; }

      - name: Notify rolling issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.NOTIFY_PAT || secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/notify_issue.sh "$(cat <<EOF
          **Monthly PBS Briefing draft** · $(TZ=America/New_York date +%F)
          Next month's nurture email (Email 06) is drafted. Review it, then paste into Wix Email Marketing and schedule for the first Tuesday, 9:00 AM EST. Audience: captured toolkit leads only (never the Substack list); exclude active clients + open sales threads.

          👉 Drafts: https://github.com/${GITHUB_REPOSITORY}/tree/main/email_gated_toolkit/briefings
          EOF
          )"
