name: Substack URL Auto-Fill + Publish Watchdog

# Mon/Wed/Thu ~10:30 AM Eastern (3 hours after the 7:30 publish): fetch the
# Benefit Blind Spots public RSS feed, fill the current week file's
# [SUBSTACK ... URL] placeholders with the live post URLs (feed-verified only,
# never invented), and warn on the rolling issue if the expected post did not
# publish. Removes the most recurring manual paste step in the system
# (added Jul 3, 2026, Tier 1 automation from the 6-month strategy audit).

on:
  schedule:
    # DST pair; the guard below lets only the matching one run.
    - cron: '30 14 * * 1,3,4'  # 10:30 AM EDT
    - cron: '30 15 * * 1,3,4'  # 10:30 AM EST
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  issues: write

jobs:
  fill-urls:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Guard against wrong-DST schedule fire
        id: guard
        env:
          TRIGGER_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          offset=$(TZ=America/New_York date +%z)
          case "$offset" in
            -0400) expected='30 14 * * 1,3,4' ;;
            -0500) expected='30 15 * * 1,3,4' ;;
            *) echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac
          if [ "$TRIGGER_SCHEDULE" = "$expected" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Fetch Substack feed + watchdog check
        if: steps.guard.outputs.should_run == 'true'
        id: feed
        run: |
          out=$(python3 .github/scripts/fetch_substack_feed.py)  # stdlib-only, no deps
          echo "$out"
          echo "watchdog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$out" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Fill URL placeholders with Claude
        if: steps.guard.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Read,Edit,Grep,Glob,Bash"
          prompt: |
            You are filling live Substack URLs into the CURRENT publish week's
            newsletter file. First run `TZ=America/New_York date +'%A %Y-%m-%d'`
            in Bash to get today's Eastern date.

            1. Read .substack_feed.json (the live Benefit Blind Spots RSS
               snapshot: title, link, published_et per entry).
            2. Identify the CURRENT publish week file in newsletters/
               (week_NN_*.md whose Run of Show / publish dates cover today).
               Also check the immediately previous week's file for placeholders
               its published posts can now fill. NEVER touch weeks after the
               current one; their posts are not published.
            3. In those files, find unfilled placeholders such as
               [SUBSTACK MONDAY DEEP DIVE URL], [SUBSTACK FIELD NOTE URL],
               [SUBSTACK ROUNDUP URL], [SUBSTACK URL], and obvious variants.
            4. For each, match the intended post to a feed entry by title
               (the week file names its deep dive / Field Note / roundup
               titles). Replace the placeholder with the entry's link ONLY on
               a confident title match to a post that is actually in the feed.
               A [SUBSTACK URL] with ambiguous context: infer from the
               surrounding lines (Field Note vs deep dive vs roundup); if
               still ambiguous, leave it.
            5. HARD RULES: never invent or guess a URL; never fill a
               placeholder for a post not present in the feed; never edit
               future week files; make no other content changes.
            6. Write a 1-5 line summary of what was filled (or "nothing to
               fill") to .url_fill_summary.txt.

            Do not commit; a later step handles it.

      - name: Commit and push
        if: steps.guard.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add newsletters/week_*.md
          if git diff --staged --quiet; then
            echo "No placeholders filled"; exit 0
          fi
          git commit -m "Auto-fill live Substack URLs: $(TZ=America/New_York date +%Y-%m-%d)"
          push_ok=0
          for attempt in 1 2 3 4 5; do
            git fetch origin main || true
            if git rebase origin/main; then
              if git push origin HEAD:main; then push_ok=1; break; fi
            else
              git rebase --abort || true
            fi
            sleep 5
          done
          [ "$push_ok" = "1" ] || { echo "ERROR: could not push"; exit 1; }

      - name: Notify rolling issue
        if: always() && steps.guard.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.NOTIFY_PAT || secrets.GITHUB_TOKEN }}
          WATCHDOG: ${{ steps.feed.outputs.watchdog }}
        run: |
          summary="(no fill summary written)"
          [ -f .url_fill_summary.txt ] && summary=$(cat .url_fill_summary.txt)
          warn=""
          case "$WATCHDOG" in
            *WATCHDOG_MISSING*)
              warn="⚠️ **PUBLISH WATCHDOG: today's expected Substack post is NOT in the feed as of 10:30 AM ET.** ${WATCHDOG#*WATCHDOG_MISSING }" ;;
          esac
          bash .github/scripts/notify_issue.sh "$(printf '**Substack URL auto-fill** · %s\n%s\n%s' "$(TZ=America/New_York date +%F)" "$summary" "$warn")"
