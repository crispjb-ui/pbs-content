name: Weekly Pharmacy Benefits Roundup

on:
  schedule:
    # Both cron lines fire; the guard step below only lets the one
    # matching 07:30 America/New_York continue. This holds 7:30 AM
    # Eastern year-round across EST and EDT.
    - cron: '30 11 * * 2'  # 7:30 AM EDT (daylight saving)
    - cron: '30 12 * * 2'  # 7:30 AM EST (standard time)
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  generate-roundup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Guard against wrong-hour schedule fire
        # Two cron lines fire (one for EST, one for EDT). This step
        # gates everything downstream so only the run at 07:30
        # America/New_York proceeds. Manual runs always proceed.
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run; proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hhmm=$(TZ=America/New_York date +%H%M)
          echo "Eastern time is $hhmm"
          if [ "$hhmm" = "0730" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not 07:30 Eastern; skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Compute run date (America/New_York)
        if: steps.guard.outputs.should_run == 'true'
        id: vars
        run: |
          echo "date_iso=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "date_file=$(TZ=America/New_York date +%Y_%m_%d)" >> "$GITHUB_OUTPUT"
          echo "stamp=$(TZ=America/New_York date +'%Y-%m-%d %H:%M %Z')" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch RSS feeds
        if: steps.guard.outputs.should_run == 'true'
        run: |
          pip install feedparser
          python .github/scripts/fetch_rss.py

      - name: Generate roundup draft with Claude
        if: steps.guard.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash,WebSearch,WebFetch"
          prompt: |
            You are drafting the Wednesday Roundup for Benefit Blind Spots.

            1. Read CLAUDE.md for voice and brand rules.
            2. Read newsletters/templates/wednesday_roundup_template.md for the exact article format.
            3. Read newsletters/roundups/rss_weekly_feed.md if present for accumulated RSS stories.

            Search the web for pharmacy benefits industry news from the past 7 days across:
              - PBM lawsuits, regulation, mergers, settlements
              - FDA drug approvals relevant to pharmacy benefits
              - Biosimilar launches, approvals, interchangeability decisions
              - GLP-1 coverage and pricing developments
              - Drug pricing legislation (Congress, CMS, HHS)
              - Self-funded employer pharmacy and PBM news
              - 340B program rulings and contract pharmacy developments
              - ERISA and fiduciary actions affecting pharmacy plans

            Select the 4-5 most significant stories for self-funded employers.
            Rank by employer cost impact first, regulatory change second, market shift third, clinical development fourth.
            Skip press releases without substance, opinion pieces without data, stories older than 7 days, and duplicate coverage.

            Write the article following the template exactly. Include the preview image prompt at the end.

            HUMANIZE PASS (built into the writing, not a separate step):
              REMOVE: "It's important to note", "Let's dive in", "navigating", "leverage" as verb, "holistic", "robust", "comprehensive", "key takeaways", "actionable insights", excessive mid-paragraph bolding, parallel list structures that read like AI output.
              ADD: "I" naturally ("I flagged this because..."), "we" for PBS ("We see this pattern in contracts..."), professional context, varied sentence length, conversational transitions between stories.
              ENFORCE: no em dashes or hyphens as sentence separators; no fabricated statistics (use "significant", "substantial", "meaningful"); brokers as partners; PBM as adversary where appropriate; every story framed through employer cost/risk lens; company is Prescription Benefit Solutions (PBS), never RXBS; CEO is Ginny Crisp, PharmD (not "Dr. Ginny Crisp").
              Save ONLY the humanized version.

            Prepend this header to the file:
              Status: DRAFT - Review before publishing to Substack
              Generated: ${{ steps.vars.outputs.stamp }}

            Save the article to newsletters/roundups/roundup_${{ steps.vars.outputs.date_file }}.md.

            Do not commit. A later workflow step will handle the commit.

      - name: Verify roundup draft was written
        if: steps.guard.outputs.should_run == 'true'
        run: |
          file="newsletters/roundups/roundup_${{ steps.vars.outputs.date_file }}.md"
          if [ ! -f "$file" ]; then
            echo "::error::Expected roundup file not found at $file. Claude did not save the draft."
            ls -la newsletters/roundups/ || true
            exit 1
          fi
          echo "Found draft at $file ($(wc -l < "$file") lines)"

      - name: Commit and push draft
        if: steps.guard.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          file="newsletters/roundups/roundup_${{ steps.vars.outputs.date_file }}.md"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add "$file" newsletters/roundups/rss_weekly_feed.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Weekly roundup draft: ${{ steps.vars.outputs.date_iso }} (review pending)"
          git push origin HEAD:main
