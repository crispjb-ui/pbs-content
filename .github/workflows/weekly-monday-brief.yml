name: Weekly Monday Brief

# Runs /pipeline-health every Monday and posts a concise operational brief to the
# rolling notifier issue: weeks built ahead, open ⚠ items, and toolkits due.
# Advisory only; commits nothing.

on:
  schedule:
    - cron: '0 11 * * 1'   # Mondays ~11:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # required by claude-code-action to fetch its OIDC token
  issues: write

jobs:
  monday-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build the Monday brief
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash"
          prompt: |
            GATES WATCHDOG (added Jul 6, 2026 — include a "Gates" section in the brief):
            check and remind with the exact command to run, only where triggered:
            (a) any wendell_potter_piece_*_draft.md whose status suggests submission is
            near and whose header verify-flags are unstamped -> "run /verify-fact <file>";
            (b) any MASTER_GAMEPLAN rollout-calendar item due within ~2 weeks whose asset
            is in the high-stakes class -> "run /red-team <file> before publish";
            (c) any case_studies/*.md capture older than ~2 weeks not yet processed ->
            "run /build-case-study <file>" (or chase the permission);
            (d) any Potter slot approaching per the cascade file with no draft -> "run
            /draft-potter-piece <NN>". Omit the section if nothing triggers.
            APPROVALS PICKUP (added Jul 16, 2026, after checked boxes sat unnoticed):
            (e) read the "PBS - Approvals needed" issue (gh issue view 42 --comments)
            and list any CHECKED checkbox that has no build/PR/status reply after it
            -> "approved, awaiting pickup: <item> - tell a session to build it".
            Checked boxes do NOT auto-build; this reminder is the pickup mechanism.
            Read CLAUDE.md and OPEN_ITEMS.md. Run the /pipeline-health slash
            command (.claude/commands/pipeline-health.md). Then write a concise
            Monday brief to /tmp/notify_body.md containing: (a) how many weeks are
            built ahead + the next week needing a build, (b) any ⚠ open items in
            the next 4 weeks, (c) toolkits due to build.
            Keep it under ~25 lines. Do not commit anything.
      - name: Notify rolling issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.NOTIFY_PAT || secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/notify_issue.sh "$(cat /tmp/notify_body.md 2>/dev/null || echo 'Monday brief: pipeline-health run, see Actions log.')"
