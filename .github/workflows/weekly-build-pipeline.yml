name: Weekly Content Pipeline Build

# Keeps ~4 weeks of newsletter material built ahead (current week + 3).
# Runs /build-pipeline, which builds the next needed week via /build-week
# (landscape research, look-back/ahead, seasonal flow, Wendell Potter check,
# shocking-fact weave, Run of Show, all build gates) and reports pipeline health.
# Built week files are DRAFTS for review; Ginny still schedules from them.

on:
  schedule:
    - cron: '0 13 * * 5'   # ~8-9 AM Eastern, Fridays (DST-approximate; build timing is not time-critical)
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  issues: write

jobs:
  build-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute run date (America/New_York)
        id: vars
        run: echo "date_iso=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Record pre-build week files
        run: ls newsletters/week_*.md | sort > /tmp/before_weeks.txt || true

      - name: Run pipeline build with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash,WebSearch,WebFetch"
          prompt: |
            Run the /build-pipeline slash command. Its definition is at
            .claude/commands/build-pipeline.md — follow every step exactly.

            It maintains a ~4-week buffer: compute the current week, find the
            highest built week, and if the buffer is short, build the next
            needed week to standard via the /build-week process
            (.claude/commands/build-week.md) against every gate in
            week_build_spec.md. Read CLAUDE.md first for voice and brand rules.

            Build week files are DRAFTS. Prepend to any NEW week file you create:
              > Status: DRAFT - review before scheduling. Auto-built ${{ steps.vars.outputs.date_iso }}.

            Do NOT commit — the next workflow step handles the commit. End by
            printing the Step 4 pipeline-health report to the log.

      - name: Commit and push (drafts, review pending)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          if git diff --staged --quiet; then
            echo "Pipeline healthy — no new week built this run."
            exit 0
          fi
          git commit -m "Pipeline auto-build: ${{ steps.vars.outputs.date_iso }} (drafts, review pending)"
          git push origin HEAD:main
          echo "New/changed files this run:"
          comm -13 /tmp/before_weeks.txt <(ls newsletters/week_*.md | sort) || true

      - name: Notify rolling issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/notify_issue.sh "$(cat <<'EOF'
          **Weekly Content Pipeline Build** · ${{ steps.vars.outputs.date_iso }}
          Weekly content pipeline build ran. New/changed week files committed as DRAFTS for review (see latest commit). Run /pipeline-health for status.
          EOF
          )"
