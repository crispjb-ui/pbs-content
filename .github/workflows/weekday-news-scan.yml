name: Weekday News Scan

# Weekday-morning PBM news sweep: decides if anything clears the same-day
# reaction bar and, if so, drafts the X reaction (+ roundup candidate) for the
# week file's 12:00 PM news-HOLD slot. Output goes to the rolling notifier issue
# only — it never edits week files, never commits content, never publishes.
# Most days correctly report "nothing cleared the bar."

on:
  schedule:
    - cron: '45 10 * * 1-5'   # weekdays 10:45 UTC ≈ 6:45 AM ET (before the 8:30 posts and the 12:00 HOLD slot)
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  news-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Run /news-scan
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Read,Grep,Glob,Bash,WebSearch,WebFetch,Write"
          prompt: |
            Read CLAUDE.md first. Then run the /news-scan slash command
            (.claude/commands/news-scan.md): sweep the last ~24h of PBM /
            pharmacy-benefits news, apply the reaction bar (most days nothing
            clears it — say so plainly), and if a story clears, draft the X
            reaction set for today's 12:00 PM news-HOLD slot per the skill
            (never colliding with the current week's reveal reservations).
            Write the result to /tmp/notify_body.md. Do not edit any repo file;
            do not commit.
      - name: Notify rolling issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.NOTIFY_PAT || secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/notify_issue.sh "$(cat /tmp/notify_body.md 2>/dev/null || echo '**News scan** ran but produced no output file; check the run log.')"
