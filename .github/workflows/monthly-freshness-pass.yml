name: Monthly Freshness Pass

# Rotates substantive refreshes through the live evergreen assets (glossary,
# toolkits, canonical pages, Contract Language Library check) so the AEO
# citation surfaces stay inside the freshness window engines prefer.
# Registry: evergreen_freshness_registry.md. Never date-bumps without a real
# change; live-surface edits are flagged to the rolling issue, never claimed done.

on:
  schedule:
    - cron: '0 13 16 * *'   # 16th of each month, ~9-10 AM ET (spaced from the 15th/18th/20th jobs)
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  issues: write

jobs:
  freshness-pass:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "date_iso=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - name: Install render deps (toolkit re-renders)
        run: pip install --quiet weasyprint pymupdf || true
      - name: Run /freshness-pass
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash,WebSearch,WebFetch"
          prompt: |
            Read CLAUDE.md first. Then run the /freshness-pass slash command
            (.claude/commands/freshness-pass.md): pick the 2-3 stalest LIVE
            assets from evergreen_freshness_registry.md, draft a SUBSTANTIVE
            refresh for each (never a date bump without a real change), apply
            the edits to the repo sources (re-render any touched toolkit's
            PDF + preview and keep _audit_pdfs.py clean), update the registry
            dates + refresh log, add judgment calls to APPROVALS_PENDING.md,
            and write the Wix/Substack edit instructions to /tmp/notify_body.md.
            If an asset has no honest improvement, skip it and say so.
            Do not commit; the next step commits.
      - name: Commit refresh updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          if git diff --staged --quiet; then echo "No freshness updates produced."; exit 0; fi
          git commit -m "Monthly freshness pass: ${{ steps.vars.outputs.date_iso }}"
          push_ok=0
          for attempt in 1 2 3 4 5; do
            git fetch origin main || true
            if git rebase origin/main; then
              if git push origin HEAD:main; then push_ok=1; break; fi
            else
              git rebase --abort || true
            fi
            echo "push attempt $attempt failed; retrying in 5s..."
            sleep 5
          done
          [ "$push_ok" = "1" ] || { echo "ERROR: could not push to main after retries"; exit 1; }
      - name: Surface approvals (tap-to-approve checkboxes)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.NOTIFY_PAT || secrets.GITHUB_TOKEN }}
        run: |
          if [ -s APPROVALS_PENDING.md ]; then
            bash .github/scripts/request_approval.sh "Monthly freshness pass · ${{ steps.vars.outputs.date_iso }}" "$(cat APPROVALS_PENDING.md)"
          else
            echo "No approvals surfaced this run."
          fi
      - name: Notify rolling issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.NOTIFY_PAT || secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/notify_issue.sh "$(cat /tmp/notify_body.md 2>/dev/null || echo '**Monthly Freshness Pass** ran; see evergreen_freshness_registry.md refresh log for what changed.')"
