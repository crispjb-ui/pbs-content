name: Monthly Ads Research

# Sweeps competitor + benefits-advisor ads (LinkedIn Ad Library), develops/refreshes
# PBS ad concepts wired to the toolkit funnel, and (once live) ingests ad performance
# to kill losers / scale winners. Auto-maintains paid_ads_bank.md +
# competitor_ad_teardown.md; PROPOSES every spend/launch decision to OPEN_ITEMS.
# Never auto-spends, never publishes. Uses the same ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: '0 13 24 * *'   # 24th of each month, ~9-10 AM ET (spaced from the other monthly jobs)
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write   # required by claude-code-action to fetch its OIDC token
  issues: write

jobs:
  ads-research:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "date_iso=$(TZ=America/New_York date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - name: Run /ads-research
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash,WebSearch,WebFetch"
          prompt: |
            Read CLAUDE.md first. Then run the /ads-research slash command
            (.claude/commands/ads-research.md). Sweep the LinkedIn Ad Library for
            the benchmark set (independent PBM auditors / pharmacy-benefits
            consultants + benefits brokers / advisor thought leaders), logging
            only ads actually observed with the date checked (ad longevity =
            working proxy). AUTO-UPDATE competitor_ad_teardown.md +
            paid_ads_bank.md (refresh/add LinkedIn ad concepts wired to live
            rxbs.org/toolkit offers; dated changelogs). If the ad performance log
            has live data, compute CTR/CPL/conversion and mark kill/scale/iterate.
            PROPOSE every spend/launch/budget/prerequisite decision to OPEN_ITEMS.md
            (do not edit CLAUDE.md). Never fabricate ads or metrics; never spend;
            never publish. Write the two-section notify body to /tmp/notify_body.md.
            Do not commit; the next step commits.
      - name: Commit bank updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          if git diff --staged --quiet; then echo "No ads-research updates produced."; exit 0; fi
          git commit -m "Monthly ads research: ${{ steps.vars.outputs.date_iso }}"
          # Rebase onto the latest main and retry so a concurrent automation push
          # (e.g. monthly + quarterly both fire on the 1st) cannot reject and lose this run.
          push_ok=0
          for attempt in 1 2 3 4 5; do
            git fetch origin main || true
            if git rebase origin/main; then
              if git push origin HEAD:main; then push_ok=1; break; fi
            else
              git rebase --abort || true
            fi
            echo "push attempt $attempt failed (likely a concurrent push); retrying in 5s..."
            sleep 5
          done
          [ "$push_ok" = "1" ] || { echo "ERROR: could not push to main after retries"; exit 1; }
      - name: Notify rolling issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.NOTIFY_PAT || secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/notify_issue.sh "$(cat /tmp/notify_body.md 2>/dev/null || echo '**Monthly Ads Research** ran; see the latest commit to paid_ads_bank.md / competitor_ad_teardown.md.')"
